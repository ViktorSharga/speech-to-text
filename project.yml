name: VoiceInk
options:
  bundleIdPrefix: com.viktorsarga
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  HotKey:
    url: https://github.com/soffes/HotKey.git
    from: "0.2.1"

targets:
  VoiceInk:
    type: application
    platform: macOS
    sources:
      - VoiceInk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.viktorsarga.VoiceInk
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: VoiceInk/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: VoiceInk/Resources/VoiceInk.entitlements
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: WhisperKit
      - package: HotKey
