name: SpeechToText
options:
  bundleIdPrefix: app.speechtotext
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  HotKey:
    url: https://github.com/soffes/HotKey.git
    from: "0.2.1"

targets:
  SpeechToText:
    type: application
    platform: macOS
    sources:
      - SpeechToText
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.speechtotext
        PRODUCT_NAME: "Speech to Text"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: SpeechToText/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SpeechToText/Resources/SpeechToText.entitlements
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: WhisperKit
      - package: HotKey
